---
# ===========================================
# VPS Setup - Full Provisioning
# ===========================================

- name: Common setup
  hosts: all
  roles:
    - role: common
      tags: [common]

- name: Users and permissions
  hosts: all
  roles:
    - role: users
      when: vps_components.users | default(false)
      tags: [users]

- name: Security hardening
  hosts: all
  roles:
    - role: security
      when: vps_components.security | default(true)
      tags: [security]

- name: Docker installation
  hosts: all
  roles:
    - role: docker
      when: vps_components.docker | default(false)
      tags: [docker]

- name: Docker Swarm (single-node manager)
  hosts: all
  roles:
    - role: swarm
      when: vps_components.swarm | default(false)
      tags: [swarm]

- name: System database services
  hosts: all
  roles:
    - role: database
      when: vps_components.database | default(false)
      tags: [database, postgresql, redis]

- name: PHP-FPM installation
  hosts: all
  roles:
    - role: php_fpm
      when: vps_components.php_fpm | default(false)
      tags: [php, php_fpm]

- name: Caddy reverse proxy
  hosts: all
  roles:
    - role: caddy
      when: vps_components.caddy | default(false)
      tags: [caddy]

- name: Caddy edge in Swarm (Cloudflare)
  hosts: all
  roles:
    - role: caddy_swarm
      when: caddy_swarm_enabled | default(false)
      tags: [caddy_swarm, swarm]

- name: Node.js runtime
  hosts: all
  roles:
    - role: nodejs
      when: vps_components.nodejs | default(false)
      tags: [nodejs, node]

- name: NVM installation
  hosts: all
  roles:
    - role: nvm
      when: vps_components.nvm | default(false)
      tags: [nvm]

- name: Bun runtime
  hosts: all
  roles:
    - role: bun
      when: vps_components.bun | default(false)
      tags: [bun]

- name: Rebuild metadata
  hosts: all
  roles:
    - role: rebuild
      when: vps_components.rebuild | default(false)
      tags: [rebuild]
