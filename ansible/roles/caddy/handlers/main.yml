---
# Caddy role handlers
#
# Order matters: on the transition to the unix-socket admin (or a new binary),
# systemd must reload the unit and Caddy must RESTART (to bind the socket via
# RuntimeDirectory) before any socket reload is attempted. Hence:
#   Reload systemd -> Restart Caddy -> Reload Caddy
# Day-2 (only a sites/*.caddy file added) triggers just a socket reload — no restart.

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Caddy
  ansible.builtin.systemd:
    name: caddy
    state: restarted
  when: caddy_runtime_available | default(true)

- name: Reload Caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded
  when: caddy_runtime_available | default(true)
