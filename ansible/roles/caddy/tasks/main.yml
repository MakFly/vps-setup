---
# Caddy role - Main tasks

- name: Install required dependencies
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Create keyrings directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: "https://dl.cloudsmith.io/public/caddy/stable/gpg.key"
    dest: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    mode: '0644'

- name: Add Caddy repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable
    update_cache: true
  when: ansible_facts.distribution == 'Debian'

- name: Add Caddy repository (Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/ubuntu any-version main"
    state: present
    filename: caddy-stable
    update_cache: true
  when: ansible_facts.distribution == 'Ubuntu'

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: latest
    update_cache: true

- name: Check whether Caddy command is available
  ansible.builtin.shell: command -v caddy
  args:
    executable: /bin/bash
  register: caddy_command
  changed_when: false
  failed_when: false
  check_mode: false

- name: Set Caddy runtime availability
  ansible.builtin.set_fact:
    caddy_runtime_available: "{{ caddy_command.rc == 0 }}"

- name: Explain skipped Caddy runtime tasks in check mode
  ansible.builtin.debug:
    msg: "Caddy would be installed; service and runtime validation tasks are skipped because this is check mode."
  when:
    - ansible_check_mode
    - not caddy_runtime_available

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'
  loop:
    - /etc/caddy
    - "{{ caddy_sites_dir }}"
    - /var/log/caddy
    - /var/lib/caddy/.local/share/caddy

- name: Configure Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: '0644'
    validate: caddy validate --adapter caddyfile --config %s
  notify: Reload Caddy

- name: Ensure Caddy owns its log directory
  # `caddy validate` runs as root and provisions the file logger, creating
  # root-owned log files the caddy service user cannot write. Reclaim them.
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    recurse: true

- name: Ensure Caddy service is enabled and started
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true
  when: caddy_runtime_available

- name: Verify Caddy is listening
  ansible.builtin.wait_for:
    port: 80
    delay: 2
    timeout: 30
  when:
    - caddy_runtime_available
    - not ansible_check_mode

- name: Ensure application base directory exists
  ansible.builtin.file:
    path: "{{ app_base_dir }}"
    state: directory

- name: Deploy Docker-app deployment convention (CLAUDE.md)
  ansible.builtin.template:
    src: apps-CLAUDE.md.j2
    dest: "{{ app_base_dir }}/CLAUDE.md"
    owner: root
    group: root
    mode: "0644"
