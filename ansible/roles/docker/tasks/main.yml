---
# Docker role - Main tasks

- name: Include OS-specific installation
  ansible.builtin.include_tasks: "{{ ansible_facts.distribution | lower }}.yml"
  tags: docker-install

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: "{{ docker_package_state }}"
    update_cache: true
  when:
    - not ansible_check_mode or docker_repository_available | default(false)
  tags: docker-install

- name: Check whether Docker command is available
  ansible.builtin.shell: command -v docker
  args:
    executable: /bin/bash
  register: docker_command
  changed_when: false
  failed_when: false
  check_mode: false
  tags: docker-install

- name: Set Docker runtime availability
  ansible.builtin.set_fact:
    docker_runtime_available: "{{ docker_command.rc == 0 }}"
  tags: docker-install

- name: Explain skipped Docker runtime tasks in check mode
  ansible.builtin.debug:
    msg: "Docker would be installed; runtime Docker service tasks are skipped because this is check mode."
  when:
    - ansible_check_mode
    - not docker_runtime_available
  tags: docker-install

- name: Ensure Docker service is running and enabled
  ansible.builtin.systemd:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"
  when: docker_runtime_available
  tags: docker-service

- name: Create Docker daemon configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'
  tags: docker-config

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart Docker
  tags: docker-config
  when: not ansible_check_mode or docker_runtime_available

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user != 'root'
  tags: docker-user

- name: Include UFW integration fix
  ansible.builtin.include_tasks: ufw_integration.yml
  when:
    - docker_iptables_fix | default(true)
    - not ansible_check_mode or ufw_runtime_available | default(false)
  tags: docker-ufw
