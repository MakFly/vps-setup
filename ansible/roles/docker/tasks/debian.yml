---
# Docker installation for Debian

- name: Remove old Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  when: docker_remove_old | default(false)

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/debian/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  register: docker_gpg_key_download

- name: Detect Debian package architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_debian_architecture
  changed_when: false
  check_mode: false

- name: Add Docker repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts.distribution_release }}
      Components: stable
      Architectures: {{ docker_debian_architecture.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'
  register: docker_repository_source

- name: Refresh apt cache for Docker repository
  ansible.builtin.apt:
    update_cache: true
  when: not ansible_check_mode

- name: Check whether Docker repository source is available
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/docker.sources
  register: docker_repository_source_file
  check_mode: false

- name: Set Docker repository availability
  ansible.builtin.set_fact:
    docker_repository_available: "{{ docker_repository_source_file.stat.exists }}"

- name: Explain skipped Docker package install in check mode
  ansible.builtin.debug:
    msg: "Docker repository would be configured; package installation is skipped because this is check mode."
  when:
    - ansible_check_mode
    - not docker_repository_available
