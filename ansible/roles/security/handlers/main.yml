---
# Security role handlers

- name: Reload UFW
  community.general.ufw:
    state: reloaded
  when: ufw_runtime_available | default(true)

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
    enabled: true
  when: fail2ban_runtime_available | default(true)

- name: Restart SSH
  ansible.builtin.systemd:
    name: "{{ ssh_service_name | default('ssh') }}"
    state: restarted

- name: Apply cf-origin-lock
  ansible.builtin.systemd:
    name: cf-origin-lock.service
    state: restarted
    daemon_reload: true
  when: not ansible_check_mode
