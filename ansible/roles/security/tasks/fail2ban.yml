---
# fail2ban Configuration

- name: Install fail2ban
  ansible.builtin.apt:
    name:
      - fail2ban
      - whois
    state: present

- name: Check whether fail2ban service file is available
  ansible.builtin.stat:
    path: /lib/systemd/system/fail2ban.service
  register: fail2ban_service_file
  check_mode: false

- name: Set fail2ban runtime availability
  ansible.builtin.set_fact:
    fail2ban_runtime_available: "{{ fail2ban_service_file.stat.exists }}"

- name: Explain skipped fail2ban service task in check mode
  ansible.builtin.debug:
    msg: "fail2ban would be installed; service start is skipped because this is check mode."
  when:
    - ansible_check_mode
    - not fail2ban_runtime_available

- name: Create fail2ban local configuration
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 10m
      findtime = 10m
      maxretry = 5
      backend = auto

      [sshd]
      enabled = true
      port = {{ fail2ban_ssh_port }}
      maxretry = {{ fail2ban_ssh_maxretry }}
      bantime = {{ fail2ban_ssh_bantime }}
      findtime = {{ fail2ban_ssh_findtime }}
      banaction = iptables-multiport
    mode: '0644'
  notify: Restart fail2ban

- name: Ensure fail2ban is running and enabled
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  when: fail2ban_runtime_available
