---
# Docker Swarm role defaults (single-node manager)

# Keep the management/data plane on loopback: a single-node swarm never needs a
# peer to join, and this stops 2377/7946/4789 from binding the public NIC.
swarm_advertise_addr: "127.0.0.1"

# Pin the docker_gwbridge subnet so PostgreSQL/pg_hba/UFW can reference a stable
# gateway. Swarm task containers egress to the host through this gateway.
swarm_gwbridge_subnet: "172.18.0.0/16"
swarm_gwbridge_gateway: "172.18.0.1"
swarm_gwbridge_enable_icc: false
swarm_gwbridge_ip_masquerade: true

# Belt-and-suspenders: explicitly deny the swarm plane ports at UFW so an
# accidental future advertise-addr change onto a public NIC still can't expose
# them. Set false for a genuine multi-node cluster (nodes need these ports).
swarm_firewall_deny_plane: true

