---
# Default component selection
# Use this file as a base configuration

vps_components:
  docker: true
  php_fpm: false
  caddy: false
  nodejs: true
  nvm: false
  bun: true
  security: true
  # Keep users enabled whenever security is: SSH hardening disables root login,
  # and the deploy-user + authorized_keys copy (users role) is what prevents a
  # lockout. Never ship security:true with users:false.
  users: true
  database: false
  swarm: false
  rebuild: false

runtime_user: "{{ ansible_user | default('root') }}"
